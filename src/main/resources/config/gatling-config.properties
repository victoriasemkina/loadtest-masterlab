# ==================== Base URL ====================
api.base.url=http://localhost:8080

# ==================== Transfer API ====================
api.rates=/api/rates
api.accounts=/api/accounts
api.transfer.validate=/api/transfer/validate
api.transfer.execute=/api/transfer/execute
api.transfer.status=/api/transfer/status/{transferId}

# ==================== Request Bodies ====================
api.body.transfer.validate=bodies/transfer/validate-transfer.json
api.body.transfer.execute=bodies/transfer/execute-transfer.json

# ==================== Timeouts ====================
api.timeout.connect=5000
api.timeout.read=10000

# ==================== Test Configuration ====================
test.rampup.duration.seconds=10
test.steady.duration.seconds=30
test.rampdown.duration.seconds=10
test.users.per.second=5