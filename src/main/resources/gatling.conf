gatling {
  http {
    # Таймаут подключения (мс)
    connectTimeout = 5000

    # Таймаут чтения ответа (мс)
    readTimeout = 10000

    # Таймаут запроса (мс)
    requestTimeout = 30000

    # Максимальное количество соединений на хост
    maxConnectionsPerHost = 100

    # Максимальное общее количество соединений
    maxConnections = 200
  }

  core {
    # Папка для результатов
    outputDirectoryBaseName = "gatling"

    # Папка для симуляций
    simulationsDirectory = "src/main/java/simulations"

    # Папка для ресурсов
    resourcesDirectory = "src/main/resources"

    # Включить отчёты
    writeSimulationOutput = true
  }
}